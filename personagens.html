<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindVault Personagens</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#2a0040,#120018);
color:white;
min-height:100vh;
}

nav{
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#d6a8ff;
}

button{
background:linear-gradient(135deg,#a855f7,#7c3aed);
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.page{
padding:30px;
max-width:1000px;
margin:auto;
}

input,textarea,select{
width:100%;
margin-top:10px;
padding:8px;
border-radius:8px;
border:none;
}

textarea{
height:120px;
}

.bookSlot{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
margin-top:20px;
}

.bookTitle{
font-size:20px;
margin-bottom:10px;
color:#d6a8ff;
}

.character{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
margin-top:10px;
}

.characterHeader{
display:flex;
gap:15px;
align-items:center;
}

.character img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.actions{
margin-left:auto;
display:flex;
gap:8px;
}

.details{
margin-top:15px;
padding:15px;
border-radius:8px;
background:rgba(255,255,255,0.05);
display:none;
line-height:1.6;
}

</style>
</head>

<body>

<nav>

<div class="logo">MindVault Personagens</div>

<div>
<button onclick="voltar()">MindVault Books</button>
</div>

</nav>

<div class="page">

<h2>Criar Personagem</h2>

<select id="livro"></select>

<input id="nome" placeholder="Nome">

<input type="file" id="foto">

<input id="idade" placeholder="Idade">

<input id="aparencia" placeholder="Aparência">

<input id="personalidade" placeholder="Personalidade">

<textarea id="historia" placeholder="História"></textarea>

<textarea id="habilidades" placeholder="Habilidades"></textarea>

<textarea id="medos" placeholder="Medos"></textarea>

<button onclick="salvarPersonagem()">Salvar personagem</button>

<h2 style="margin-top:40px">Personagens por Livro</h2>

<div id="booksContainer"></div>

</div>

<script>

const { jsPDF } = window.jspdf

function voltar(){
window.location.href="textos.html"
}

function carregarLivros(){

let books=JSON.parse(localStorage.getItem("books") || "[]")

let select=document.getElementById("livro")

select.innerHTML=""

books.forEach(b=>{
select.innerHTML+=`<option value="${b.titulo}">${b.titulo}</option>`
})

}

function salvarPersonagem(){

let livro=document.getElementById("livro").value
let nome=document.getElementById("nome").value
let idade=document.getElementById("idade").value
let aparencia=document.getElementById("aparencia").value
let personalidade=document.getElementById("personalidade").value
let historia=document.getElementById("historia").value
let habilidades=document.getElementById("habilidades").value
let medos=document.getElementById("medos").value

let fotoInput=document.getElementById("foto").files[0]

function salvar(fotoBase64){

let chars=JSON.parse(localStorage.getItem("characters") || "[]")

chars.push({
livro,
nome,
idade,
aparencia,
personalidade,
historia,
habilidades,
medos,
foto:fotoBase64
})

localStorage.setItem("characters",JSON.stringify(chars))

render()

}

if(fotoInput){

let reader=new FileReader()

reader.onload=e=>salvar(e.target.result)

reader.readAsDataURL(fotoInput)

}else{

salvar("")

}

}

function render(){

let books=JSON.parse(localStorage.getItem("books") || "[]")
let chars=JSON.parse(localStorage.getItem("characters") || "[]")

let container=document.getElementById("booksContainer")

container.innerHTML=""

books.forEach(b=>{

container.innerHTML+=`

<div class="bookSlot">

<div class="bookTitle">${b.titulo}</div>

<div id="slot-${b.titulo}"></div>

</div>

`

})

chars.forEach((c,i)=>{

let slot=document.getElementById("slot-"+c.livro)

if(!slot) return

slot.innerHTML+=`

<div class="character">

<div class="characterHeader">

<img src="${c.foto || 'https://via.placeholder.com/70'}">

<div>

<b>${c.nome}</b><br>
${c.personalidade || ""}

</div>

<div class="actions">

<button onclick="toggleDetails(${i})">Ver</button>
<button onclick="exportarPDF(${i})">PDF</button>
<button onclick="deletar(${i})">Excluir</button>

</div>

</div>

<div id="details-${i}" class="details">

<p><b>Idade:</b> ${c.idade || ""}</p>
<p><b>Aparência:</b> ${c.aparencia || ""}</p>
<p><b>Personalidade:</b> ${c.personalidade || ""}</p>
<p><b>Habilidades:</b> ${c.habilidades || ""}</p>
<p><b>Medos:</b> ${c.medos || ""}</p>
<p><b>História:</b> ${c.historia || ""}</p>

</div>

</div>

`

})

}

function toggleDetails(i){

let d=document.getElementById("details-"+i)

if(d.style.display==="block"){
d.style.display="none"
}else{
d.style.display="block"
}

}

function deletar(i){

let chars=JSON.parse(localStorage.getItem("characters") || "[]")

chars.splice(i,1)

localStorage.setItem("characters",JSON.stringify(chars))

render()

}

async function exportarPDF(i){

let chars=JSON.parse(localStorage.getItem("characters") || "[]")

let c=chars[i]

let pdf=new jsPDF()

let y=20

pdf.setFontSize(22)
pdf.text(c.nome,20,y)

y+=10

pdf.setFontSize(14)
pdf.text("Livro: "+c.livro,20,y)

y+=15

pdf.setFontSize(12)

pdf.text("Idade: "+(c.idade||""),20,y)
y+=10

pdf.text("Aparência: "+(c.aparencia||""),20,y)
y+=10

pdf.text("Personalidade: "+(c.personalidade||""),20,y)
y+=10

pdf.text("Habilidades: "+(c.habilidades||""),20,y)
y+=10

pdf.text("Medos: "+(c.medos||""),20,y)
y+=10

let historia=pdf.splitTextToSize(c.historia || "",170)

pdf.text(historia,20,y)

let blob=pdf.output("blob")

let file=new File([blob],c.nome+".pdf",{type:"application/pdf"})

if(navigator.canShare && navigator.canShare({files:[file]})){

navigator.share({
title:c.nome,
files:[file]
})

}else{

pdf.save(c.nome+".pdf")

}

}

carregarLivros()

render()

</script>

</body>
</html>
