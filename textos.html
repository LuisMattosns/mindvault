<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindVault Books</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#2a0040,#120018);
color:white;
min-height:100vh;
}

nav{
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#d6a8ff;
}

button{
background:linear-gradient(135deg,#a855f7,#7c3aed);
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.page{
display:none;
padding:30px;
max-width:800px;
margin:auto;
}

.active{
display:block;
}

input,textarea{
width:100%;
margin-top:10px;
padding:8px;
border-radius:8px;
border:none;
}

textarea{
height:140px;
}

.book{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
margin-top:15px;
display:flex;
gap:15px;
}

.book img{
width:90px;
height:130px;
object-fit:cover;
border-radius:6px;
}

.reader{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
line-height:1.6;
margin-top:20px;
}

.search{
padding:8px;
border-radius:8px;
border:none;
width:200px;
}

@media (max-width:768px){

nav{
flex-wrap:wrap;
}

.search{
width:100%;
margin-top:10px;
}

button{
width:100%;
margin-top:8px;
}

.book{
flex-direction:column;
align-items:center;
text-align:center;
}

.book img{
width:120px;
height:170px;
}

.page{
padding:20px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">MindVault Books</div>

<input class="search" id="search" placeholder="Pesquisar livros">

<div>

<button onclick="showPage('feed')">Biblioteca</button>
<button onclick="showPage('criar')">Escrever</button>
<button onclick="goHome()">MindVault</button>

</div>

</nav>

<div id="feed" class="page active">

<h2>Biblioteca</h2>

<div id="books"></div>

</div>

<div id="criar" class="page">

<h2>Criar livro</h2>

<input id="tituloLivro" placeholder="Título">
<input id="autorLivro" placeholder="Autor">
<input type="file" id="capaLivro">

<textarea id="sinopseLivro" placeholder="Sinopse"></textarea>
<textarea id="descricaoLivro" placeholder="Descrição"></textarea>

<h3>Novo capítulo</h3>

<input id="tituloCapitulo" placeholder="Título do capítulo">
<textarea id="textoCapitulo" placeholder="Escreva o capítulo"></textarea>

<button onclick="adicionarCapitulo()">Adicionar capítulo</button>

<p id="contadorCap"></p>

<button onclick="salvarLivro()">Salvar livro</button>

</div>

<div id="ler" class="page">

<h2 id="tituloLeitura"></h2>

<div id="listaCapitulos"></div>

<div class="reader" id="textoLeitura"></div>

</div>

<!-- BOTÃO NOVO -->

<div style="text-align:center;margin-top:40px;margin-bottom:40px;">
<button onclick="irPersonagens()">MindVault Personagens</button>
</div>

<script>

const { jsPDF } = window.jspdf

let capitulos=[]

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function goHome(){
window.location.href="index.html"
}

function irPersonagens(){
window.location.href="personagens.html"
}

function adicionarCapitulo(){

let titulo=tituloCapitulo.value
let texto=textoCapitulo.value

if(!titulo || !texto){
alert("Escreva título e texto")
return
}

capitulos.push({titulo,texto})

contadorCap.innerText="Capítulos adicionados: "+capitulos.length

tituloCapitulo.value=""
textoCapitulo.value=""

}

function salvarLivro(){

let titulo=tituloLivro.value
let autor=autorLivro.value
let sinopse=sinopseLivro.value
let descricao=descricaoLivro.value

if(!titulo || !autor){
alert("Preencha título e autor")
return
}

let books=JSON.parse(localStorage.getItem("books") || "[]")

let capaInput=document.getElementById("capaLivro").files[0]

function finalizarSalvamento(capaBase64){

books.unshift({
titulo,
autor,
sinopse,
descricao,
capitulos:[...capitulos],
capa:capaBase64 || ""
})

localStorage.setItem("books",JSON.stringify(books))

capitulos=[]

contadorCap.innerText=""

tituloLivro.value=""
autorLivro.value=""
sinopseLivro.value=""
descricaoLivro.value=""

renderBooks()

showPage("feed")

}

if(capaInput){

let reader=new FileReader()

reader.onload=function(e){
finalizarSalvamento(e.target.result)
}

reader.readAsDataURL(capaInput)

}else{

finalizarSalvamento("")

}

}

function abrirLivro(i){

let books=JSON.parse(localStorage.getItem("books") || "[]")

let livro=books[i]

tituloLeitura.innerText=livro.titulo+" - "+livro.autor

listaCapitulos.innerHTML=""

livro.capitulos.forEach((c,index)=>{

listaCapitulos.innerHTML+=`
<button onclick="lerCapitulo(${i},${index})">
${c.titulo}
</button>
`

})

textoLeitura.innerText=""

showPage("ler")

}

function lerCapitulo(livroIndex,capIndex){

let books=JSON.parse(localStorage.getItem("books") || "[]")

textoLeitura.innerText=books[livroIndex].capitulos[capIndex].texto

}

function renderBooks(){

let books=JSON.parse(localStorage.getItem("books") || "[]")

let container=document.getElementById("books")

let search=document.getElementById("search").value.toLowerCase()

container.innerHTML=""

books.forEach((b,i)=>{

if(b.titulo.toLowerCase().includes(search)){

container.innerHTML+=`

<div class="book">

<img src="${b.capa || 'https://via.placeholder.com/90x130'}">

<div>

<h3>${b.titulo}</h3>

<p><b>Autor:</b> ${b.autor}</p>

<p>${b.sinopse}</p>

<button onclick="abrirLivro(${i})">Ler</button>

<button onclick="gerarPDF(${i})">Compartilhar</button>

</div>

</div>

`

}

})

}

search.addEventListener("input",renderBooks)

renderBooks()

async function gerarPDF(index){

let books=JSON.parse(localStorage.getItem("books") || "[]")

let livro=books[index]

let pdf=new jsPDF()

let y=20

pdf.setFontSize(22)
pdf.text(livro.titulo,20,y)

y+=10

pdf.setFontSize(14)
pdf.text("Autor: "+livro.autor,20,y)

y+=15

pdf.setFontSize(16)
pdf.text("Sinopse",20,y)

y+=10

pdf.setFontSize(12)

let sinopse=pdf.splitTextToSize(livro.sinopse || "",170)

pdf.text(sinopse,20,y)

y+=sinopse.length*7+10

livro.capitulos.forEach((c,i)=>{

if(y>260){
pdf.addPage()
y=20
}

pdf.setFontSize(16)
pdf.text("Capítulo "+(i+1)+": "+c.titulo,20,y)

y+=10

pdf.setFontSize(12)

let texto=pdf.splitTextToSize(c.texto,170)

texto.forEach(l=>{

if(y>280){
pdf.addPage()
y=20
}

pdf.text(l,20,y)
y+=7

})

y+=10

})

let paginas=pdf.getNumberOfPages()

for(let i=1;i<=paginas;i++){

pdf.setPage(i)

pdf.setFontSize(10)

pdf.text("Página "+i+" / "+paginas,180,290,null,null,"right")

}

let blob=pdf.output("blob")

let file=new File([blob],livro.titulo+".pdf",{type:"application/pdf"})

if(navigator.canShare && navigator.canShare({files:[file]})){

navigator.share({
title:livro.titulo,
files:[file]
})

}else{

pdf.save(livro.titulo+".pdf")

}

}

</script>

</body>
</html>
