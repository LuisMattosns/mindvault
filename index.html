<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindVault</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#2a0040,#120018);
color:white;
min-height:100vh;
}

/* NAVBAR */

nav{
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#d6a8ff;
}

.nav-buttons button{
margin-left:10px;
}

/* BOTÕES */

button{
background:linear-gradient(135deg,#a855f7,#7c3aed);
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

/* PÁGINAS */

.page{
display:none;
padding:30px;
max-width:700px;
margin:auto;
}

.active{
display:block;
}

/* POST */

textarea{
width:100%;
height:80px;
border-radius:8px;
border:none;
padding:10px;
margin-top:10px;
}

.post{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
margin-top:15px;
}

/* PERFIL */

.profile{
text-align:center;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
border:3px solid #a855f7;
}

input,textarea{
margin-top:10px;
padding:8px;
border-radius:8px;
border:none;
width:100%;
}

.search{
padding:8px;
border-radius:8px;
border:none;
width:200px;
}

/* RESPONSIVO CELULAR */

@media (max-width:768px){

nav{
flex-wrap:wrap;
}

.search{
width:100%;
margin-top:10px;
}

.nav-buttons{
width:100%;
display:flex;
flex-wrap:wrap;
margin-top:10px;
}

.nav-buttons button{
flex:1;
margin:5px 0;
}

button{
width:100%;
}

.page{
padding:20px;
}

.profile img{
width:90px;
height:90px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">MindVault</div>

<input class="search" id="search" placeholder="Pesquisar frases">

<div class="nav-buttons">

<button onclick="showPage('feed')">Feed</button>
<button onclick="showPage('perfil')">Perfil</button>
<button onclick="showPage('login')">Entrar</button>
<button onclick="showPage('cadastro')">Cadastrar</button>
<button onclick="logout()">Sair</button>

</div>

</nav>

<!-- FEED -->

<div id="feed" class="page active">

<h2>Compartilhar pensamento</h2>

<textarea id="postInput" placeholder="Escreva uma frase filosófica..."></textarea>

<button onclick="createPost()">Publicar</button>

<div id="posts"></div>

</div>

<!-- PERFIL -->

<div id="perfil" class="page">

<div class="profile">

<img id="profilePic" src="https://i.imgur.com/2DhmtJ4.png">

<input type="file" id="photoInput">

<input id="nameInput" placeholder="Seu nome">

<textarea id="bioInput" placeholder="Sua descrição"></textarea>

<button onclick="saveProfile()">Salvar Perfil</button>

<h3 id="profileTitle"></h3>

<div id="userPosts"></div>

</div>

</div>

<!-- LOGIN -->

<div id="login" class="page">

<h2>Entrar</h2>

<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- CADASTRO -->

<div id="cadastro" class="page">

<h2>Cadastrar</h2>

<input id="cadUser" placeholder="Usuário">
<input id="cadPass" type="password" placeholder="Senha (mínimo 8 caracteres)">

<button onclick="register()">Criar conta</button>

</div>

<!-- BOTÃO BOOKS -->

<div style="text-align:center;margin-top:80px;padding-bottom:60px;">

<h2 style="margin-bottom:15px;">MindVault Books</h2>

<p style="opacity:0.7;margin-bottom:20px;">
Escreva e publique seus próprios livros
</p>

<button onclick="window.location.href='textos.html'">
Entrar no MindVault Books
</button>

</div>

<script>

/* TROCAR PÁGINA */

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="perfil"){
loadProfile()
}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("loggedUser")

alert("Você saiu da conta")

showPage("login")

}

/* CADASTRO */

function register(){

let user=cadUser.value
let pass=cadPass.value

if(pass.length<8){
alert("Senha precisa ter pelo menos 8 caracteres")
return
}

let users=JSON.parse(localStorage.getItem("users")||"[]")

if(users.find(u=>u.user==user)){
alert("Usuário já existe")
return
}

users.push({user,pass})

localStorage.setItem("users",JSON.stringify(users))

alert("Conta criada!")

showPage("login")

}

/* LOGIN */

function login(){

let user=loginUser.value
let pass=loginPass.value

let users=JSON.parse(localStorage.getItem("users")||"[]")

let found=users.find(u=>u.user==user && u.pass==pass)

if(!found){
alert("Login inválido")
return
}

localStorage.setItem("loggedUser",user)

alert("Login realizado!")

showPage("feed")

}

/* PERFIL */

function saveProfile(){

let name=nameInput.value
let bio=bioInput.value

localStorage.setItem("name_"+localStorage.getItem("loggedUser"),name)
localStorage.setItem("bio_"+localStorage.getItem("loggedUser"),bio)

alert("Perfil salvo")

}

function loadProfile(){

let user=localStorage.getItem("loggedUser")

if(!user) return

let name=localStorage.getItem("name_"+user)
let bio=localStorage.getItem("bio_"+user)
let photo=localStorage.getItem("photo_"+user)

if(name) nameInput.value=name
if(bio) bioInput.value=bio
if(photo) profilePic.src=photo

}

/* FOTO */

photoInput.addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(e){

profilePic.src=e.target.result

let user=localStorage.getItem("loggedUser")

localStorage.setItem("photo_"+user,e.target.result)

}

reader.readAsDataURL(file)

})

/* POST */

function createPost(){

let user=localStorage.getItem("loggedUser")

if(!user){
alert("Você precisa estar logado para postar")
return
}

let text=postInput.value.trim()

if(text.length<3){
alert("Escreva algo maior")
return
}

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

posts.unshift({
text,
author:user,
likes:[],
date:new Date().toLocaleString()
})

localStorage.setItem("posts",JSON.stringify(posts))

postInput.value=""

renderPosts()

}

/* CURTIR */

function likePost(i){

let user=localStorage.getItem("loggedUser")

if(!user){
alert("Faça login para curtir")
return
}

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

let post=posts[i]

if(post.likes.includes(user)){

alert("Você já curtiu")

}else{

post.likes.push(user)

}

localStorage.setItem("posts",JSON.stringify(posts))

renderPosts()

}

/* DELETAR POST */

function deletePost(i){

let confirmDelete = confirm("Você tem certeza que deseja excluir esta frase?")

if(!confirmDelete) return

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

posts.splice(i,1)

localStorage.setItem("posts",JSON.stringify(posts))

renderPosts()

}

/* ABRIR PERFIL */

function openProfile(author){

showPage("perfil")

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

userPosts.innerHTML=""

posts.forEach(p=>{

if(p.author==author){

userPosts.innerHTML+=`

<div class="post">

<p>${p.text}</p>

<small>${p.date}</small>

<button>❤️ ${p.likes.length}</button>

</div>

`

}

})

let count=posts.filter(p=>p.author==author).length

profileTitle.innerText="Frases de "+author+" ("+count+")"

}

/* RENDER FEED */

function renderPosts(){

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

let container=document.getElementById("posts")

let search=document.getElementById("search").value.toLowerCase()

let user=localStorage.getItem("loggedUser")

container.innerHTML=""

posts.forEach((p,i)=>{

if(p.text.toLowerCase().includes(search)){

container.innerHTML+=`

<div class="post">

<p>${p.text}</p>

<small onclick="openProfile('${p.author}')" style="cursor:pointer">
por ${p.author}
</small>

<br>

<small style="opacity:0.6">${p.date}</small>

<br>

<button onclick="likePost(${i})">❤️ ${p.likes.length}</button>

${p.author===user ? `<button onclick="deletePost(${i})">🗑️ Deletar</button>` : ""}

</div>

`

}

})

}

search.addEventListener("input",renderPosts)

loadProfile()
renderPosts()

if(localStorage.getItem("loggedUser")){
showPage("feed")
}

</script>

</body>
</html>
